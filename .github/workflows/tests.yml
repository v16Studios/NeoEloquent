name: tests

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.1"
            laravel: "10.0"
          - php: "8.2"
            laravel: "10.0"
          - php: "8.2"
            laravel: "11.0"
          - php: "8.2"
            laravel: "12.0"
          - php: "8.3"
            laravel: "11.0"
          - php: "8.3"
            laravel: "12.0"
          - php: "8.3"
            laravel: "13.0"
          - php: "8.4"
            laravel: "12.0"
          - php: "8.4"
            laravel: "13.0"

    services:
      neo4j:
        image: neo4j:latest
        env:
          NEO4J_AUTH: neo4j/test
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer require --no-interaction --no-update \
            illuminate/support:^${{ matrix.laravel }} \
            illuminate/database:^${{ matrix.laravel }} \
            illuminate/pagination:^${{ matrix.laravel }} \
            illuminate/events:^${{ matrix.laravel }} \
            illuminate/console:^${{ matrix.laravel }}
          composer update --prefer-dist --no-interaction

      - name: Wait for Neo4j
        run: |
          for i in {1..30}; do
            if curl --silent --fail http://127.0.0.1:7474 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run test suite
        run: composer test
